global:
  scrape_interval: 12s

scrape_configs:
  - job_name: beacon
    static_configs:
      - targets: ["beacon:8080"]

  - job_name: nethermind
    static_configs:
      - targets: ["nethermind:8088"]

  - job_name: node
    static_configs:
      - targets: ["node_exporter:9100"]

  - job_name: peer-geo
    static_configs:
      - targets: ["peer-geo-exporter:9101"]
