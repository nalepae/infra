services:
  nethermind:
    container_name: nethermind
    image: ${NETHERMIND_IMAGE}
    stop_grace_period: 10m
    tty: true
    restart: unless-stopped
    volumes:
      - ./data/${NETWORK}/nethermind:/nethermind/nethermind_db
      - ./data/${NETWORK}/nethermind/logs:/nethermind/logs
      - ./data/${NETWORK}/ipc:/nethermind/keystore
    ports:
      - "30303:30303" # p2p
      - "127.0.0.1:8545:8545" # JSON-RPC
      - "127.0.0.1:8551:8551" # Engine API
    command:
      - --config=${NETWORK}
      - --JsonRpc.EngineHost=0.0.0.0
      - --JsonRpc.EnginePort=8551
      - --Metrics.Enabled=true
      - --Metrics.ExposeHost=0.0.0.0
      - --Metrics.ExposePort=8088
      - --Metrics.EnableDbSizeMetrics=true
      - --Metrics.EnableDetailedMetric=true
      - --Metrics.CountersEnabled=true
    environment:
      - NETHERMIND_IMAGE=${NETHERMIND_IMAGE}
      - NETWORK=${NETWORK}

  beacon:
    container_name: beacon
    image: ${BEACON_IMAGE}
    tty: true
    restart: unless-stopped
    stop_grace_period: 10m
    volumes:
      - ./data/${NETWORK}/beacon:/root/.eth2/
      - ./data/${NETWORK}/ipc:/var/run/ipc
    ports:
      - 12000:12000/udp # discv5
      - 13000:13000/udp # libp2p (UDP)
      - 13000:13000 # libp2p (TCP)
      - 127.0.0.1:3500:3500 # beacon REST API
      - 127.0.0.1:4000:4000 # beacon gRPC API
      - 127.0.0.1:8080:8080 # beacon monitoring API
      - 127.0.0.1:6060:6060 # pprof
    command:
      - --accept-terms-of-use
      - --${NETWORK}
      - --suggested-fee-recipient=0xbB52ca978a8a2598e496dC1Eed76C23F2400541b
      - --execution-endpoint=http://nethermind:8551
      - --jwt-secret=/var/run/ipc/jwt-secret
      - --checkpoint-sync-url=${CHECKPOINT_SYNC_URL}
      - --p2p-host-ip=${P2P_HOST_IP}
      - --rpc-host=0.0.0.0
      - --grpc-gateway-host=0.0.0.0
      - --http-mev-relay=http://mev-boost:18550
      - --verbosity=debug
      - --blob-storage-layout=by-epoch
      - --monitoring-host=0.0.0.0
      - --pprof
      - --pprofaddr=0.0.0.0
      - --enable-tracing
      - --tracing-endpoint=http://tempo:4318/v1/traces
      - --tracing-process-name=beacon
      - --trace-sample-fraction=1.0
    environment:
      - BEACON_IMAGE=${BEACON_IMAGE}
      - NETWORK=${NETWORK}
      - CHECKPOINT_SYNC_URL=${CHECKPOINT_SYNC_URL}
      - P2P_HOST_IP=${P2P_HOST_IP}

  alloy:
    container_name: alloy
    image: grafana/alloy
    restart: unless-stopped
    volumes:
      - ./configuration/alloy.hcl:/etc/alloy/config.hcl
      - ./data/${NETWORK}/beacon/logs:/var/log/beacon:ro
      - ./data/${NETWORK}/nethermind/logs:/var/log/nethermind:ro
    command: run /etc/alloy/config.hcl
    environment:
      - NETWORK=${NETWORK}

  node_exporter:
    container_name: node-exporter
    image: prom/node-exporter:latest
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro,rslave

  loki:
    container_name: loki
    image: grafana/loki
    restart: unless-stopped
    ports:
      - 127.0.0.1:3100:3100
    volumes:
      - loki:/loki

  prometheus:
    container_name: prometheus
    image: prom/prometheus:v3.6.0
    restart: unless-stopped
    volumes:
      - ./configuration/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus:/prometheus
    ports:
      - 127.0.0.1:9090:9090
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage

  pyroscope:
    container_name: pyroscope
    image: grafana/pyroscope
    restart: unless-stopped
    ports:
      - 127.0.0.1:4040:4040

  tempo:
    container_name: tempo
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./configuration/tempo.yaml:/etc/tempo/tempo.yaml
      - tempo:/var/tempo
    ports:
      - 127.0.0.1:3200:3200 # tempo HTTP API (Grafana queries)
      - 127.0.0.1:4318:4318 # OTLP/HTTP ingest

  grafana:
    container_name: grafana
    image: grafana/grafana:12.4
    restart: unless-stopped
    user: "1000"
    volumes:
      - grafana:/var/lib/grafana
      - ./configuration/grafana/dashboard.yaml:/etc/grafana/provisioning/dashboards/default.yml
      - ./configuration/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/default.yml
      - ./configuration/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - 3000:3000

volumes:
  loki:
  prometheus:
  grafana:
  tempo:
